# Telegraf config for Raspberry Pi fleet metrics -> MQTT -> Home Assistant.
# Mounted read-only into the telegraf container at /etc/telegraf/telegraf.conf.
# HA_HOST / MQTT_USER / MQTT_PASS come from .env via docker compose.

[agent]
  interval              = "30s"
  flush_interval        = "30s"
  hostname              = ""
  omit_hostname         = false
  collection_jitter     = "2s"
  round_interval        = true
  metric_batch_size     = 1000
  metric_buffer_limit   = 10000

# ---------------- inputs ----------------

[[inputs.cpu]]
  percpu       = false
  totalcpu     = true
  fielddrop    = ["time_*", "usage_guest*", "usage_nice",
                  "usage_softirq", "usage_steal", "usage_irq"]

[[inputs.mem]]
  fieldinclude = ["used_percent", "used", "total", "available"]

[[inputs.temp]]
  # /sys/class/thermal + /sys/class/hwmon. Pi SoC = "cpu_thermal".

[[inputs.smart]]
  path_smartctl = "/usr/sbin/smartctl"
  path_nvme     = "/usr/sbin/nvme"
  # Container runs as root, so sudo is unnecessary.
  use_sudo      = false
  attributes    = false
  interval      = "300s"
  # SATA disks behind a USB-SATA bridge need the -d sat hint or smartctl
  # returns "Unknown USB bridge". Edit this list per Pi — leave only the
  # devices `smartctl --scan` reports, using the same -d flags it prints.
  devices = ["/dev/sda -d sat", "/dev/nvme0"]

# ---------------- output ----------------
# One topic per plugin per host. SMART emits one JSON message per disk on
# the same topic; HA filters by the `device` tag inside value_template.

[[outputs.mqtt]]
  servers        = ["tcp://${HA_HOST}:1883"]
  username       = "${MQTT_USER}"
  password       = "${MQTT_PASS}"
  topic_prefix   = "metrics_pi"
  data_format    = "json"
  json_timestamp_units = "1s"
  qos            = 0
  retain         = true
  # Produces topics: metrics_pi/<host>/cpu, metrics_pi/<host>/mem,
  # metrics_pi/<host>/temp, metrics_pi/<host>/smart_device
  namedrop       = ["smart_attribute"]
