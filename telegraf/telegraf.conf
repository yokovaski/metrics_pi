# Telegraf config for Raspberry Pi fleet metrics -> MQTT -> Home Assistant.
# Mounted read-only into the telegraf container at /etc/telegraf/telegraf.conf.
# HA_HOST / MQTT_USER / MQTT_PASS come from .env via docker compose.

[agent]
  interval              = "30s"
  flush_interval        = "30s"
  hostname              = ""
  omit_hostname         = false
  collection_jitter     = "2s"
  round_interval        = true
  metric_batch_size     = 1000
  metric_buffer_limit   = 10000

# ---------------- inputs ----------------

[[inputs.cpu]]
  percpu       = false
  totalcpu     = true
  fieldexclude = ["time_*", "usage_guest*", "usage_nice",
                  "usage_softirq", "usage_steal", "usage_irq"]

[[inputs.mem]]
  fieldinclude = ["used_percent", "used", "total", "available"]

[[inputs.temp]]
  # /sys/class/thermal + /sys/class/hwmon. Pi SoC = "cpu_thermal".

# Filesystem usage. Walks ${HOST_PROC}/self/mounts and statfs()s each
# mountpoint under ${HOST_MOUNT_PREFIX}=/hostfs (host root rbind-mounted
# in docker-compose.yml). Emits one MQTT message per filesystem to
# metrics_pi/<host>/disk; HA filters by the `device` tag.
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devpts", "overlay", "aufs",
               "squashfs", "iso9660", "cgroup", "cgroup2",
               "proc", "sysfs", "configfs", "debugfs", "tracefs",
               "fusectl", "pstore", "bpf", "binfmt_misc", "nsfs",
               "mqueue", "hugetlbfs", "autofs", "rpc_pipefs"]
  fielddrop = ["inodes_*"]

# inputs.smart silently failed in production (exit_status=2, no fields)
# even though the same smartctl command run manually succeeded. We call
# smartctl directly via inputs.exec and parse the JSON output instead.
# One block per disk so the `device` tag can be set statically; the
# probe script handles retries and pre-waking USB-SATA drives.
# SATA via USB-SATA bridge: probe 09–23 local time only. smartctl pre-wakes
# the drive, so polling at all keeps it spun up — confining probes to the
# active window lets the drive sleep overnight (eliminates first-request
# spin-up latency once it has slept). Window args reach smart_probe.sh.
[[inputs.exec]]
  commands     = ["/usr/local/bin/smart_probe.sh /dev/sda sat 9 24"]
  interval     = "60s"
  timeout      = "120s"
  data_format  = "json_v2"
  name_override = "smart_device"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.field]]
      path   = "temperature.current"
      rename = "temp_c"
      type   = "int"
    [[inputs.exec.json_v2.field]]
      path   = "smart_status.passed"
      rename = "health_ok"
      type   = "bool"

  [inputs.exec.tags]
    device = "sda"

# NVMe controllers don't spin down — probe 24/7 at the same cadence as
# the cheap inputs (cpu/mem/disk). smartctl on NVMe is a millisecond ioctl.
[[inputs.exec]]
  commands     = ["/usr/local/bin/smart_probe.sh /dev/nvme0 nvme"]
  interval     = "30s"
  timeout      = "30s"
  data_format  = "json_v2"
  name_override = "smart_device"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.field]]
      path   = "temperature.current"
      rename = "temp_c"
      type   = "int"
    [[inputs.exec.json_v2.field]]
      path   = "smart_status.passed"
      rename = "health_ok"
      type   = "bool"

  [inputs.exec.tags]
    device = "nvme0"

# ---------------- output ----------------
# One topic per plugin per host. SMART emits one JSON message per disk on
# the same topic; HA filters by the `device` tag inside value_template.

[[outputs.mqtt]]
  servers        = ["tcp://${HA_HOST}:1883"]
  username       = "${MQTT_USER}"
  password       = "${MQTT_PASS}"
  # Replaces the deprecated topic_prefix option (removed in 1.35).
  # Produces topics: metrics_pi/<host>/cpu, metrics_pi/<host>/mem,
  # metrics_pi/<host>/temp, metrics_pi/<host>/smart_device
  topic          = "metrics_pi/{{ .Hostname }}/{{ .PluginName }}"
  data_format    = "json"
  json_timestamp_units = "1s"
  qos            = 0
  retain         = true
  namedrop       = ["smart_attribute"]
