# Telegraf config for Raspberry Pi fleet metrics -> MQTT -> Home Assistant.
# Mounted read-only into the telegraf container at /etc/telegraf/telegraf.conf.
# HA_HOST / MQTT_USER / MQTT_PASS come from .env via docker compose.

[agent]
  interval              = "30s"
  flush_interval        = "30s"
  hostname              = ""
  omit_hostname         = false
  collection_jitter     = "2s"
  round_interval        = true
  metric_batch_size     = 1000
  metric_buffer_limit   = 10000
  debug                 = true

# ---------------- inputs ----------------

[[inputs.cpu]]
  percpu       = false
  totalcpu     = true
  fieldexclude = ["time_*", "usage_guest*", "usage_nice",
                  "usage_softirq", "usage_steal", "usage_irq"]

[[inputs.mem]]
  fieldinclude = ["used_percent", "used", "total", "available"]

[[inputs.temp]]
  # /sys/class/thermal + /sys/class/hwmon. Pi SoC = "cpu_thermal".

# inputs.smart silently failed in production (exit_status=2, no fields)
# even though the same smartctl command run manually succeeded. We call
# smartctl directly via inputs.exec and parse the JSON output instead.
# One block per disk so the `device` tag can be set statically; the
# probe script handles retries and pre-waking USB-SATA drives.
[[inputs.exec]]
  commands     = ["/usr/local/bin/smart_probe.sh /dev/sda sat"]
  interval     = "300s"
  timeout      = "120s"
  data_format  = "json_v2"
  name_override = "smart_device"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.field]]
      path   = "temperature.current"
      rename = "temp_c"
      type   = "int"
    [[inputs.exec.json_v2.field]]
      path   = "smart_status.passed"
      rename = "health_ok"
      type   = "bool"

  [inputs.exec.tags]
    device = "sda"

[[inputs.exec]]
  commands     = ["/usr/local/bin/smart_probe.sh /dev/nvme0 nvme"]
  interval     = "300s"
  timeout      = "120s"
  data_format  = "json_v2"
  name_override = "smart_device"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.field]]
      path   = "temperature.current"
      rename = "temp_c"
      type   = "int"
    [[inputs.exec.json_v2.field]]
      path   = "smart_status.passed"
      rename = "health_ok"
      type   = "bool"

  [inputs.exec.tags]
    device = "nvme0"

# ---------------- output ----------------
# One topic per plugin per host. SMART emits one JSON message per disk on
# the same topic; HA filters by the `device` tag inside value_template.

[[outputs.mqtt]]
  servers        = ["tcp://${HA_HOST}:1883"]
  username       = "${MQTT_USER}"
  password       = "${MQTT_PASS}"
  # Replaces the deprecated topic_prefix option (removed in 1.35).
  # Produces topics: metrics_pi/<host>/cpu, metrics_pi/<host>/mem,
  # metrics_pi/<host>/temp, metrics_pi/<host>/smart_device
  topic          = "metrics_pi/{{ .Hostname }}/{{ .PluginName }}"
  data_format    = "json"
  json_timestamp_units = "1s"
  qos            = 0
  retain         = true
  namedrop       = ["smart_attribute"]
